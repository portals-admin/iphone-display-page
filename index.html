<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Billion iPhones</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #canvas { display: block; width: 100%; height: 100%; }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }

    #title {
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -.4px;
      text-shadow: 0 0 20px rgba(110,142,251,.8);
    }

    #counter-wrap {
      text-align: right;
    }

    #counter {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(90deg, #6e8efb, #a777e3, #3de0c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      letter-spacing: -1px;
    }

    #counter-label {
      font-size: .7rem;
      color: rgba(255,255,255,.45);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #6e8efb, #a777e3, #3de0c8);
      transition: width .1s linear;
      z-index: 10;
      box-shadow: 0 0 10px rgba(110,142,251,.8);
    }

    #milestone {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: rgba(110,142,251,.15);
      border: 1px solid rgba(110,142,251,.4);
      backdrop-filter: blur(8px);
      padding: .5rem 1.4rem;
      border-radius: 999px;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity .4s ease;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="title">A Billion iPhones</div>
  <div id="counter-wrap">
    <div id="counter">0</div>
    <div id="counter-label">iPhones spawned</div>
  </div>
</div>

<div id="progress-bar" style="width:0%"></div>
<div id="milestone"></div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const counterEl   = document.getElementById('counter');
  const progressBar = document.getElementById('progress-bar');
  const milestoneEl = document.getElementById('milestone');

  const BILLION = 1_000_000_000;

  // ── Resize ────────────────────────────────────────────────────
  let W, H;
  function resize() {
    W = canvas.width  = window.innerWidth  * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  // ── iPhone mini-drawing ───────────────────────────────────────
  function drawPhone(x, y, w, h, angle, alpha, color) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(angle);

    const r = w * 0.22;

    // Frame
    ctx.beginPath();
    roundRect(ctx, -w/2, -h/2, w, h, r);
    ctx.fillStyle = color;
    ctx.fill();

    // Screen (inset)
    const sp = w * 0.1;
    const sr = r * 0.6;
    ctx.beginPath();
    roundRect(ctx, -w/2 + sp, -h/2 + sp, w - sp*2, h - sp*2, sr);
    ctx.fillStyle = '#000d1a';
    ctx.fill();

    // Screen glow
    ctx.beginPath();
    roundRect(ctx, -w/2 + sp, -h/2 + sp, w - sp*2, h - sp*2, sr);
    const grad = ctx.createRadialGradient(0, -h*0.1, 0, 0, 0, h*0.4);
    grad.addColorStop(0, 'rgba(110,142,251,0.35)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Dynamic island pill
    const pW = w * 0.35, pH = h * 0.045;
    ctx.beginPath();
    roundRect(ctx, -pW/2, -h/2 + sp + pH * 0.6, pW, pH, pH/2);
    ctx.fillStyle = '#000';
    ctx.fill();

    // Home indicator
    const hiW = w * 0.3, hiH = h * 0.015;
    ctx.beginPath();
    roundRect(ctx, -hiW/2, h/2 - sp - hiH*2, hiW, hiH, hiH/2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();

    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  // ── Particle system ───────────────────────────────────────────
  const COLORS = [
    '#1a1a1a','#2a2a2a',          // Black Titanium
    '#c8c8c8','#e8e8e8',          // White Titanium
    '#c8a96e','#f0d08a',          // Desert Gold
    '#3a5f8a','#5a8aba',          // Blue Titanium
    '#8a8070','#b0a898',          // Natural Titanium
    '#6e8efb','#a777e3','#3de0c8',// Glow variants
  ];

  const MAX_PARTICLES = 800;
  const particles = [];

  function spawnParticle() {
    const angle = Math.random() * Math.PI * 2;
    const speed = (0.5 + Math.random() * 2.5) * devicePixelRatio;
    const size  = (10 + Math.random() * 28) * devicePixelRatio;
    const cx = W / 2 + (Math.random() - 0.5) * W * 0.3;
    const cy = H / 2 + (Math.random() - 0.5) * H * 0.3;

    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: size,
      h: size * 2.1,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.06,
      alpha: 0,
      fadeIn: 0.04 + Math.random() * 0.04,
      life: 0,
      maxLife: 120 + Math.random() * 200,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
    });
  }

  // ── Burst on click/tap ────────────────────────────────────────
  function burst(cx, cy, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (1 + Math.random() * 4) * devicePixelRatio;
      const size  = (8 + Math.random() * 22) * devicePixelRatio;
      particles.push({
        x: cx * devicePixelRatio,
        y: cy * devicePixelRatio,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        w: size, h: size * 2.1,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.1,
        alpha: 0,
        fadeIn: 0.08,
        life: 0,
        maxLife: 80 + Math.random() * 120,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
      });
    }
  }

  canvas.addEventListener('click', e => burst(e.clientX, e.clientY, 40));
  canvas.addEventListener('touchstart', e => {
    for (const t of e.touches) burst(t.clientX, t.clientY, 30);
  });

  // ── Counter & milestones ──────────────────────────────────────
  let spawned = 0;
  const MILESTONES = [
    1_000, 10_000, 100_000,
    1_000_000, 10_000_000, 100_000_000,
    500_000_000, 1_000_000_000,
  ];
  let nextMilestoneIdx = 0;
  let milestoneTimer = 0;

  function formatNum(n) {
    if (n >= 1e9)  return (n / 1e9).toFixed(3).replace(/\.?0+$/, '') + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
    if (n >= 1e3)  return (n / 1e3).toFixed(1).replace(/\.?0+$/, '') + 'K';
    return n.toLocaleString();
  }

  function showMilestone(n) {
    milestoneEl.textContent = `🎉 ${n.toLocaleString()} iPhones spawned!`;
    milestoneEl.style.opacity = '1';
    milestoneTimer = 120;
  }

  // Spawn rate accelerates over time
  let frame = 0;
  let spawnAccum = 0;

  function getSpawnRate() {
    // Ramp: 5/frame → 60/frame over ~3000 frames
    return Math.min(5 + frame * 0.018, 60);
  }

  // ── Starfield background ──────────────────────────────────────
  const stars = Array.from({ length: 200 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.5 * devicePixelRatio,
    a: Math.random(),
  }));

  // ── Main loop ─────────────────────────────────────────────────
  function loop() {
    requestAnimationFrame(loop);
    frame++;

    // Background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (const s of stars) {
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.2 + s.a * 0.5})`;
      ctx.fill();
    }

    // Spawn new particles
    if (spawned < BILLION) {
      const rate = getSpawnRate();
      spawnAccum += rate;
      while (spawnAccum >= 1) {
        spawnAccum--;
        spawned++;
        if (particles.length < MAX_PARTICLES) spawnParticle();
      }

      // Milestone check
      if (nextMilestoneIdx < MILESTONES.length && spawned >= MILESTONES[nextMilestoneIdx]) {
        showMilestone(MILESTONES[nextMilestoneIdx]);
        nextMilestoneIdx++;
      }
    }

    // Update & draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++;
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.015 * devicePixelRatio; // gentle gravity
      p.rot += p.rotV;

      // Fade in / fade out
      const fadeOutStart = p.maxLife * 0.7;
      if (p.life < p.maxLife * 0.2) {
        p.alpha = Math.min(p.alpha + p.fadeIn, 0.9);
      } else if (p.life > fadeOutStart) {
        p.alpha = 0.9 * (1 - (p.life - fadeOutStart) / (p.maxLife - fadeOutStart));
      }

      if (p.life >= p.maxLife || p.alpha <= 0) {
        particles.splice(i, 1);
        continue;
      }

      drawPhone(p.x, p.y, p.w, p.h, p.rot, p.alpha, p.color);
    }

    // HUD: counter
    counterEl.textContent = formatNum(spawned);
    if (spawned >= BILLION) {
      counterEl.textContent = '1,000,000,000';
    }

    // Progress bar
    const pct = Math.min(spawned / BILLION * 100, 100);
    progressBar.style.width = pct + '%';

    // Milestone fade out
    if (milestoneTimer > 0) {
      milestoneTimer--;
      if (milestoneTimer === 0) milestoneEl.style.opacity = '0';
    }
  }

  loop();
</script>
</body>
</html>
